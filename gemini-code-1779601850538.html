<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <!-- นำเข้าฟอนต์ Mali จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff9a9e;
            --bg-color: #fecfef;
            --text-light: #fff;
            --text-dark: #5d4037;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Mali', cursive;
            background-color: var(--bg-color);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
        }

        /* 1. พื้นหลัง Ghibli */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* เปลี่ยนลิงก์รูปพื้นหลังตรงนี้ */
            background-image: url('https://imgur.com/undefined'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(40, 20, 10, 0.4), rgba(80, 40, 30, 0.6));
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* 2. กล่องของขวัญ */
        #gift-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .gift-box {
            position: relative;
            width: 120px;
            height: 100px;
            background-color: #ff5e62;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        .gift-box::before { /* ริบบิ้นแนวตั้ง */
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100%;
            background-color: #ffd700;
        }

        .gift-box::after { /* ฝากล่อง */
            content: '';
            position: absolute;
            top: -15px;
            left: -5px;
            width: 130px;
            height: 30px;
            background-color: #ff4b4f;
            border-radius: 3px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .ribbon-bow {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 30px;
            display: flex;
            justify-content: space-between;
            z-index: 2;
        }
        .ribbon-bow .bow-left, .ribbon-bow .bow-right {
            width: 25px;
            height: 20px;
            background-color: #ffd700;
            border-radius: 50% 50% 0 50%;
            transform: rotate(-30deg);
        }
        .ribbon-bow .bow-right {
            border-radius: 50% 50% 50% 0;
            transform: rotate(30deg);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both !important;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* 3. เนื้อหาหลัก (โพลาลอยด์ & ข้อความ) */
        #main-content {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            min-height: 100vh;
            padding-top: 5vh;
            transition: opacity 1.5s ease;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
            max-width: 160px;
        }

        .polaroid img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        /* เอียงรูปสลับไปมาให้ดูเป็นธรรมชาติ */
        .polaroid:nth-child(1) { transform: rotate(-5deg) translateY(30px); }
        .polaroid:nth-child(2) { transform: rotate(3deg) translateY(30px); }
        .polaroid:nth-child(3) { transform: rotate(-3deg) translateY(30px); }
        .polaroid:nth-child(4) { transform: rotate(5deg) translateY(30px); }

        .polaroid.show:nth-child(1) { transform: rotate(-5deg) translateY(0); opacity: 1; }
        .polaroid.show:nth-child(2) { transform: rotate(3deg) translateY(0); opacity: 1; transition-delay: 0.3s;}
        .polaroid.show:nth-child(3) { transform: rotate(-3deg) translateY(0); opacity: 1; transition-delay: 0.6s;}
        .polaroid.show:nth-child(4) { transform: rotate(5deg) translateY(0); opacity: 1; transition-delay: 0.9s;}

        .message-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            line-height: 1.6;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 1.5s;
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 4. Lyrics เลื่อนแบบ IG */
        .lyrics-section {
            width: 100%;
            height: 180px;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
            opacity: 0;
            transition: opacity 1s ease 2s;
        }

        .lyrics-section.show {
            opacity: 1;
        }

        .lyrics-wrapper {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateY(0);
        }

        .lyric-line {
            text-align: center;
            font-size: 1.2rem;
            padding: 10px 20px;
            color: rgba(255, 255, 255, 0.4);
            filter: blur(1.5px);
            transition: all 0.4s ease;
            transform: scale(0.9);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .lyric-line.active {
            color: #fff;
            filter: blur(0);
            transform: scale(1.15);
            font-weight: 600;
            opacity: 1;
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.3), 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* Particle Effects */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            opacity: 1;
            z-index: 20;
        }

        @media (max-width: 600px) {
            .polaroid { max-width: 130px; }
            .message-box { font-size: 1.1rem; padding: 20px; }
            .lyric-line { font-size: 1rem; }
            .lyric-line.active { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- พื้นหลัง -->
    <div class="background"></div>
    <div class="overlay"></div>

    <!-- YouTube IFrame API -->
    <div id="player-container" style="display: none;"></div>

    <!-- หน้าแรก: กล่องของขวัญ -->
    <div id="gift-container">
        <div class="gift-box" id="gift-box">
            <div class="ribbon-bow">
                <div class="bow-left"></div>
                <div class="bow-right"></div>
            </div>
        </div>
    </div>

    <!-- หน้าเนื้อหาหลัก (แสดงหลังกดกล่อง) -->
    <div id="main-content">
        <!-- 4 รูปโพลาลอยด์ -->
        <div class="gallery" id="gallery">
            <div class="polaroid"><img src="https://imgur.com/U0DIIoa" alt="Photo 1"></div>
            <div class="polaroid"><img src="https://imgur.com/r1tTnGW" alt="Photo 2"></div>
            <div class="polaroid"><img src="https://imgur.com/IDWAjTq" alt="Photo 3"></div>
            <div class="polaroid"><img src="https://imgur.com/dk1iQ5S" alt="Photo 4"></div>
        </div>

        <!-- ข้อความอวยพร -->
        <div class="message-box" id="message-box">
            เย้เย้ เค้ารักบี๋มากๆเลย เค้าอยากอยู่กับบี๋นานๆ<br>
            ไปเที่ยวด้วยกันเยอะๆ มีความสุขทุกๆวัน<br>
            เค้าตั้งใจทำเพื่อบี๋เลยนะ<br>
            <strong>เฟิร์สรักบีมนะครับ จุ๊บๆ</strong>
        </div>

        <!-- เนื้อเพลง IG Story Style -->
        <div class="lyrics-section" id="lyrics-section">
            <div class="lyrics-wrapper" id="lyrics-wrapper">
                <!-- เนื้อเพลงจะถูกสร้างด้วย JS ที่นี่ -->
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ข้อมูลเนื้อเพลงและเวลา (วินาที) สำหรับเพลง Sunday Morning
        // ==========================================
        const lyricsData = [
            { time: 0.0, text: "🎵 (ดนตรีบรรเลง) 🎵" },
            { time: 14.0, text: "Sunday morning, rain is falling" },
            { time: 18.5, text: "Steal some covers, share some skin" },
            { time: 25.0, text: "Clouds are shrouding us in moments unforgettable" },
            { time: 30.5, text: "You twist to fit the mold that I am in" },
            { time: 36.5, text: "But things just get so crazy" },
            { time: 39.5, text: "Living life gets hard to do" },
            { time: 43.0, text: "And I would gladly hit the road" },
            { time: 46.5, text: "Get up and go if I knew" },
            { time: 50.0, text: "That someday it would lead me back to you" },
            { time: 54.5, text: "That someday it would lead me back to you" },
            { time: 62.0, text: "That may be all I need" },
            { time: 69.0, text: "In darkness, she is all I see" },
            { time: 74.5, text: "Come and rest your bones with me" },
            { time: 81.0, text: "Driving slow on Sunday morning" },
            { time: 87.0, text: "And I never want to leave" },
            { time: 94.0, text: "Fingers trace your every outline" },
            { time: 99.0, text: "Paint a picture with my hands" },
            { time: 105.0, text: "Back and forth we sway like branches in a storm" },
            { time: 111.0, text: "Change the weather, still together when it ends" },
            { time: 117.0, text: "That may be all I need" },
            { time: 124.0, text: "In darkness, she is all I see" },
            { time: 129.5, text: "Come and rest your bones with me" },
            { time: 136.0, text: "Driving slow on Sunday morning" },
            { time: 142.0, text: "And I never want to leave" },
            { time: 149.0, text: "🎷 (Solo) 🎷" },
            { time: 155.0, text: "เฟิร์สรักบีมมากๆ นะครับ ❤️" },
            { time: 161.0, text: "อยู่ด้วยกันไปนานๆ ทุกๆ วันเลยนะ 🌻" },
            { time: 172.0, text: "But things just get so crazy" },
            { time: 175.5, text: "Living life gets hard to do" },
            { time: 178.0, text: "Sunday morning, rain is falling and I'm calling out to you" },
            { time: 185.0, text: "Singing, someday it'll bring me back to you" },
            { time: 190.0, text: "Find a way to bring myself back home to you" },
            { time: 197.0, text: "And you may not know" },
            { time: 202.0, text: "That may be all I need" },
            { time: 209.0, text: "In darkness, she is all I see" },
            { time: 214.5, text: "Come and rest your bones with me" },
            { time: 221.0, text: "Driving slow on Sunday morning" },
            { time: 228.0, text: "Driving slow..." },
            { time: 235.0, text: "เย้เย้ จบแล้ว จุ๊บๆ 😘" }
        ];

        // ==========================================
        // ตั้งค่า YouTube Player API
        // ==========================================
        let player;
        const videoId = 'KUmZp8pR1uc'; 

        // โหลด Script ของ YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-container', {
                height: '0',
                width: '0',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'playsinline': 1
                }
            });
        }

        // ==========================================
        // การทำงานของเว็บ & อนิเมชัน
        // ==========================================
        const giftContainer = document.getElementById('gift-container');
        const giftBox = document.getElementById('gift-box');
        const mainContent = document.getElementById('main-content');
        const lyricsWrapper = document.getElementById('lyrics-wrapper');
        
        let lyricsElements = [];
        let currentLyricIndex = -1;
        let isPlaying = false;

        // 1. สร้าง Elements ของเนื้อเพลง
        function initLyrics() {
            lyricsData.forEach((lyric, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.innerText = lyric.text;
                div.id = 'lyric-' + index;
                lyricsWrapper.appendChild(div);
                lyricsElements.push(div);
            });
        }

        // 2. เอฟเฟกต์พลุตอนเปิดกล่อง
        function createSparkles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // สุ่มตำแหน่งกระจาย
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.left = `calc(50% - 4px)`;
                particle.style.top = `calc(50% - 4px)`;
                particle.style.transition = 'all 1s cubic-bezier(0, .9, .57, 1)';
                particle.style.transform = 'translate(0, 0) scale(1)';

                document.body.appendChild(particle);

                // เริ่มอนิเมชัน
                setTimeout(() => {
                    particle.style.transform = `translate(${tx}px, ${ty}px) scale(0)`;
                    particle.style.opacity = '0';
                }, 10);

                // ลบทิ้งเมื่อจบ
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 3. เริ่มการซิงค์เนื้อเพลง
        function syncLyrics() {
            if (!player || !player.getCurrentTime) return;
            
            const time = player.getCurrentTime();
            let newIndex = -1;

            // หาเนื้อเพลงท่อนที่กำลังร้อง
            for (let i = 0; i < lyricsData.length; i++) {
                if (time >= lyricsData[i].time) {
                    newIndex = i;
                } else {
                    break;
                }
            }

            // ถ้ามีการเปลี่ยนท่อน ให้เลื่อนและเปลี่ยนคลาส
            if (newIndex !== currentLyricIndex && newIndex !== -1) {
                if (currentLyricIndex !== -1) {
                    lyricsElements[currentLyricIndex].classList.remove('active');
                }
                lyricsElements[newIndex].classList.add('active');
                currentLyricIndex = newIndex;

                // คำนวณระยะการเลื่อน (ให้ท่อน active อยู่ตรงกลาง)
                const activeElement = lyricsElements[newIndex];
                const offsetTop = activeElement.offsetTop;
                const elementHeight = activeElement.offsetHeight;
                
                // เลื่อน wrapper ขึ้นตามระยะ
                const translateValue = -(offsetTop - (80)); // 80 คือครึ่งหนึ่งของความสูงกล่องเนื้อเพลง
                lyricsWrapper.style.transform = `translateY(${translateValue}px)`;
            }

            if (isPlaying) {
                requestAnimationFrame(syncLyrics);
            }
        }

        // 4. เหตุการณ์เมื่อกดกล่องของขวัญ
        giftBox.addEventListener('click', () => {
            // เล่นเพลง (ข้ามข้อจำกัด Autoplay เพราะผู้ใช้กดคลิกแล้ว)
            if(player && player.playVideo) {
                player.playVideo();
                isPlaying = true;
                requestAnimationFrame(syncLyrics);
            }

            // สั่นกล่อง
            giftBox.classList.add('shake');
            
            setTimeout(() => {
                // เอฟเฟกต์พลุ
                createSparkles();
                
                // ซ่อนกล่อง
                giftContainer.style.opacity = '0';
                
                setTimeout(() => {
                    giftContainer.style.display = 'none';
                    
                    // โชว์เนื้อหาหลัก
                    mainContent.style.display = 'flex';
                    // บังคับ reflow เล็กน้อยให้ css transition ทำงาน
                    void mainContent.offsetWidth; 
                    
                    mainContent.style.opacity = '1';

                    // เริ่มเฟดอินทีละส่วน
                    document.querySelectorAll('.polaroid').forEach(el => el.classList.add('show'));
                    document.getElementById('message-box').classList.add('show');
                    document.getElementById('lyrics-section').classList.add('show');

                }, 500);
            }, 500);
        });

        // Initialize เมื่อโหลดหน้าเสร็จ
        window.onload = () => {
            initLyrics();
        };

    </script>
</body>
</html>
