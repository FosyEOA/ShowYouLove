<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เฟิร์สรักบีม 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Itim', cursive;
    min-height: 100vh;
    overflow-x: hidden;
    background: #1a0a00;
  }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background: url('https://images.unsplash.com/photo-1499678329028-101435549a4e?w=1600&q=80') center/cover no-repeat;
    background-color: #3b2a1a;
  }
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(160deg,
      rgba(60,30,10,.55) 0%,
      rgba(90,50,20,.45) 40%,
      rgba(30,15,5,.65) 100%);
  }

  /* hand-drawn Ghibli-ish SVG scene */
  #scene { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── MAIN SCROLL CONTAINER ── */
  #app {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── GIFT SCREEN ── */
  #gift-screen {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px;
  }

  .title-top {
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: #ffe8b0;
    text-shadow: 0 2px 12px rgba(255,160,50,.7);
    animation: floatY 3s ease-in-out infinite;
    text-align: center; padding: 0 1rem;
  }

  /* ── GIFT BOX ── */
  #gift-wrap { cursor: pointer; animation: pulse 1.8s ease-in-out infinite; user-select: none; }
  #gift-wrap:hover { animation: wobble .5s ease-in-out infinite; }
  #gift-wrap.shake { animation: shake .5s ease-in-out; }
  #gift-wrap.gone { opacity: 0; transform: scale(0) rotate(20deg); transition: all .6s cubic-bezier(.4,2,.6,1); pointer-events: none; }

  .box-3d {
    width: 140px; height: 130px;
    position: relative;
    transform-style: preserve-3d;
    perspective: 600px;
  }
  .box-body {
    width: 140px; height: 90px;
    background: linear-gradient(135deg, #ff8fab, #ff6b9d);
    border-radius: 8px;
    position: absolute; bottom: 0;
    box-shadow:
      inset -8px 0 0 rgba(0,0,0,.15),
      0 10px 30px rgba(255,100,150,.5),
      0 4px 8px rgba(0,0,0,.3);
    overflow: hidden;
  }
  .box-body::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 18px; height: 100%;
    background: rgba(255,255,255,.3);
  }
  .box-body::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 30%;
    background: rgba(0,0,0,.08);
  }
  .box-lid {
    width: 148px; height: 38px;
    background: linear-gradient(135deg, #ff6b9d, #e84393);
    border-radius: 6px 6px 0 0;
    position: absolute; top: 0; left: -4px;
    box-shadow: 0 -4px 12px rgba(255,100,150,.4);
    transition: transform .4s ease;
    transform-origin: bottom center;
  }
  .box-lid::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 18px; height: 100%;
    background: rgba(255,255,255,.25);
  }
  /* ribbon vertical */
  .ribbon-v {
    position: absolute; left: 50%; transform: translateX(-50%);
    top: 0; bottom: 0; width: 18px;
    background: linear-gradient(90deg, #ffe0a0, #ffd060, #ffe0a0);
    z-index: 2; border-radius: 2px;
  }
  .ribbon-h {
    position: absolute; top: 0; left: 0; right: 0; height: 18px;
    background: linear-gradient(180deg, #ffe0a0, #ffd060, #ffe0a0);
    z-index: 2; border-radius: 2px;
  }
  /* bow */
  .bow {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 28px; z-index: 3;
  }
  .bow-left, .bow-right {
    position: absolute; top: 0;
    width: 26px; height: 22px;
    background: linear-gradient(135deg, #ffd060, #ffb020);
    border-radius: 50% 0 50% 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .bow-left  { left: 0;  transform: rotate(-35deg); }
  .bow-right { right: 0; transform: rotate(35deg); }
  .bow::after {
    content: '';
    position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px;
    background: #ffb020;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }

  .click-hint {
    font-size: 1rem; color: #ffe8b0;
    text-shadow: 0 1px 6px rgba(0,0,0,.5);
    animation: blink 1.6s ease-in-out infinite;
  }

  /* ── SPARKLES ── */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 99;
    width: 10px; height: 10px;
    border-radius: 50%;
    animation: sparkleAnim 1s forwards;
  }

  /* ── REVEAL SECTION ── */
  #reveal { display: none; width: 100%; flex-direction: column; align-items: center; padding-bottom: 40px; }
  #reveal.show { display: flex; }

  .reveal-title {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #ffe8b0;
    text-shadow: 0 2px 16px rgba(255,160,50,.8);
    margin: 40px 0 20px;
    text-align: center;
    animation: floatY 3s ease-in-out infinite;
  }

  /* ── POLAROIDS ── */
  #polaroids {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 20px; padding: 10px 20px;
    max-width: 900px;
  }

  .polaroid {
    background: #fff9f0;
    padding: 12px 12px 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.2);
    border-radius: 3px;
    opacity: 0; transform: translateY(60px) rotate(0deg) scale(.9);
    transition: opacity .7s ease, transform .7s cubic-bezier(.2,1.4,.4,1);
    cursor: pointer;
    position: relative;
    flex: 0 0 auto;
  }
  .polaroid:nth-child(1) { transform: translateY(60px) rotate(-4deg) scale(.9); transition-delay: .1s; }
  .polaroid:nth-child(2) { transform: translateY(60px) rotate(3deg)  scale(.9); transition-delay: .25s; }
  .polaroid:nth-child(3) { transform: translateY(60px) rotate(-2deg) scale(.9); transition-delay: .4s; }
  .polaroid:nth-child(4) { transform: translateY(60px) rotate(5deg)  scale(.9); transition-delay: .55s; }

  .polaroid.visible:nth-child(1) { opacity:1; transform: rotate(-4deg) scale(1); }
  .polaroid.visible:nth-child(2) { opacity:1; transform: rotate(3deg)  scale(1); }
  .polaroid.visible:nth-child(3) { opacity:1; transform: rotate(-2deg) scale(1); }
  .polaroid.visible:nth-child(4) { opacity:1; transform: rotate(5deg)  scale(1); }

  .polaroid:hover { transform: scale(1.07) rotate(0deg) !important; z-index: 10; box-shadow: 0 16px 48px rgba(0,0,0,.45); }

  .polaroid img {
    width: 170px; height: 170px;
    object-fit: cover; object-position: center top;
    display: block;
    border-radius: 1px;
    background: #ddd;
  }
  .polaroid .caption {
    text-align: center; margin-top: 8px;
    font-size: .85rem; color: #b07050;
    font-family: 'Itim', cursive;
  }

  /* ── MESSAGE BOX ── */
  #msg-box {
    max-width: 580px; width: 90%;
    background: rgba(255,240,210,.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(255,220,140,.4);
    border-radius: 20px;
    padding: 28px 32px;
    margin: 30px auto 10px;
    text-align: center;
    opacity: 0; transform: translateY(30px);
    transition: opacity .8s ease .9s, transform .8s ease .9s;
    box-shadow: 0 8px 32px rgba(200,100,50,.15);
  }
  #msg-box.visible { opacity: 1; transform: translateY(0); }
  #msg-box p {
    font-size: clamp(1.05rem, 3vw, 1.3rem);
    color: #ffe8c0;
    line-height: 2;
    text-shadow: 0 1px 6px rgba(0,0,0,.4);
  }
  .heart-deco { font-size: 1.8rem; margin-bottom: 8px; animation: heartBeat 1.2s ease-in-out infinite; }

  /* ── MUSIC SECTION ── */
  #music-section {
    width: 100%; max-width: 680px;
    margin: 20px auto 0;
    padding: 0 16px 60px;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    opacity: 0; transform: translateY(30px);
    transition: opacity .8s ease 1.4s, transform .8s ease 1.4s;
  }
  #music-section.visible { opacity: 1; transform: translateY(0); }

  .music-label {
    font-size: 1.1rem; color: #ffe8b0;
    text-shadow: 0 1px 8px rgba(0,0,0,.5);
  }

  #yt-wrapper {
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    width: 100%; max-width: 480px;
    aspect-ratio: 16/9;
    background: #000;
  }
  #yt-wrapper iframe { width: 100%; height: 100%; border: 0; display: block; }

  /* ── LYRICS ── */
  #lyrics-container {
    width: 100%;
    height: 240px;
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #lyrics-inner {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .lyric-line {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: #ffe8c0;
    padding: 6px 16px;
    border-radius: 30px;
    text-align: center;
    transition: all .4s ease;
    filter: blur(2px);
    opacity: .35;
    transform: scale(.88);
    white-space: pre-wrap;
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .lyric-line.active {
    filter: blur(0);
    opacity: 1;
    transform: scale(1.12);
    color: #fff;
    text-shadow: 0 0 18px rgba(255,200,100,.9), 0 2px 8px rgba(0,0,0,.6);
    background: rgba(255,180,80,.15);
  }
  .lyric-line.past { filter: blur(1.5px); opacity: .22; transform: scale(.9); }

  /* ── FLOATING HEARTS ── */
  .float-heart {
    position: fixed; pointer-events: none; z-index: 1;
    font-size: 1.4rem;
    animation: floatHeart linear forwards;
    opacity: .7;
  }

  /* ── KEYFRAMES ── */
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes wobble {
    0%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}100%{transform:rotate(0)}
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-5deg)}
    40%{transform:translateX(10px) rotate(5deg)}60%{transform:translateX(-8px)}
    80%{transform:translateX(8px) rotate(-3deg)}
  }
  @keyframes floatY {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes heartBeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
  @keyframes sparkleAnim {
    0%  { transform: translate(0,0) scale(1); opacity: 1; }
    100%{ transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }
  @keyframes floatHeart {
    0%  { transform: translateY(0) scale(1); opacity: .7; }
    100%{ transform: translateY(-100vh) scale(.5); opacity: 0; }
  }
  @keyframes starTwinkle { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
</style>
</head>

  /* ── BUILD LYRICS DOM ── */
  const lyricsInner = document.getElementById('lyrics-inner');
  lyricsData.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.textContent = l.text;
    div.id = 'lyric-' + i;
    lyricsInner.appendChild(div);
  });

  let activeLyricIdx = -1;
  function updateLyrics(t) {
    let cur = -1;
    for (let i = 0; i < lyricsData.length; i++) {
      if (t >= lyricsData[i].time) cur = i;
    }
    if (cur === activeLyricIdx) return;
    activeLyricIdx = cur;
    const lines = document.querySelectorAll('.lyric-line');
    lines.forEach((el, i) => {
      el.classList.remove('active', 'past');
      if (i === cur) el.classList.add('active');
      else if (i < cur) el.classList.add('past');
    });
    if (cur >= 0) {
      const activeEl = document.getElementById('lyric-' + cur);
      if (activeEl) {
        const container = document.getElementById('lyrics-container');
        const cH = container.clientHeight;
        const elTop = activeEl.offsetTop;
        const elH  = activeEl.offsetHeight;
        const scrollTarget = elTop - (cH / 2) + (elH / 2);
        lyricsInner.style.transform = `translateY(${-scrollTarget + cH/2 - elH/2}px)`;
      }
    }
  }

  /* ── YOUTUBE IFrame API ── */
  let ytPlayer = null, lyricTimer = null;
  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      videoId: 'to5Sg2KeEnU',
      playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) {
            clearInterval(lyricTimer);
            lyricTimer = setInterval(() => {
              const t = ytPlayer.getCurrentTime();
              updateLyrics(t);
            }, 300);
          } else {
            clearInterval(lyricTimer);
          }
        }
      }
    });
  };
  // Load YT API
  const ytScript = document.createElement('script');
  ytScript.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);

  /* ── SPARKLES ── */
  function spawnSparkles(x, y) {
    const colors = ['#ffd700','#ff8fab','#fff','#ffb347','#ff6b9d','#a8edea'];
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const angle = Math.random() * 360;
      const dist  = 60 + Math.random() * 140;
      const dx = Math.cos(angle * Math.PI/180) * dist + 'px';
      const dy = Math.sin(angle * Math.PI/180) * dist + 'px';
      s.style.cssText = `
        left:${x}px; top:${y}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${4+Math.random()*10}px;
        height:${4+Math.random()*10}px;
        --dx:${dx}; --dy:${dy};
        animation-duration:${.6+Math.random()*.8}s;
        box-shadow:0 0 6px currentColor;
      `;
      document.body.appendChild(s);
      s.addEventListener('animationend', () => s.remove());
    }
  }

  /* ── FLOATING HEARTS ── */
  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = ['💛','🌸','✨','💕','🌻','💖'][Math.floor(Math.random()*6)];
    h.style.cssText = `
      left:${Math.random()*100}vw;
      bottom: -40px;
      animation-duration:${4+Math.random()*5}s;
      font-size:${1+Math.random()*1.2}rem;
    `;
    document.body.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  }
  setInterval(spawnHeart, 1800);

  /* ── OPEN GIFT ── */
  function openGift() {
    const wrap = document.getElementById('gift-wrap');
    if (wrap.classList.contains('shake')) return;

    wrap.classList.add('shake');
    const r = wrap.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;

    setTimeout(() => {
      spawnSparkles(cx, cy);
      wrap.classList.add('gone');

      setTimeout(() => {
        document.getElementById('gift-screen').style.display = 'none';
        const reveal = document.getElementById('reveal');
        reveal.classList.add('show');

        // animate polaroids
        setTimeout(() => {
          document.querySelectorAll('.polaroid').forEach(p => p.classList.add('visible'));
        }, 100);

        setTimeout(() => {
          document.getElementById('msg-box').classList.add('visible');
          document.getElementById('music-section').classList.add('visible');
        }, 600);

        // extra sparkles celebration
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            spawnSparkles(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.6);
          }, i * 200);
        }
      }, 700);
    }, 500);
  }
