<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เฟิร์สรักบีม 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Itim', cursive; 
    min-height: 100vh; 
    overflow-x: hidden; 
    background: #1a0a00;
    /* ป้องกันกรอบสีเทาๆ เวลาแตะหน้าจอในมือถือ */
    -webkit-tap-highlight-color: transparent; 
  }

  /* พื้นหลัง */
  #bg { 
    position: fixed; inset: 0; z-index: -2;
    background-image: url('https://i.postimg.cc/0j744BPw/84E3B9EB-D1F3-4039-A5B1-CCDAED22BE45.png'); 
    background-size: cover; background-position: center;
  }
  #bg::after { 
    content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.2); 
  }

  /* SVG ลวดลาย (ห้ามบังการแตะหน้าจอเด็ดขาด) */
  #scene { position: fixed; inset: 0; z-index: -1; pointer-events: none !important; }
  
  /* กล่องหลัก ให้อยู่ชั้นบนสุด */
  #app { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* GIFT */
  #gift-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; width: 100%; }
  .title-top { font-size: clamp(1.4rem,4vw,2rem); color: #ffe8b0; text-shadow: 0 2px 12px rgba(0,0,0,0.8); animation: floatY 3s ease-in-out infinite; text-align: center; padding: 0 1rem; pointer-events: none; }
  
  /* ทำให้พื้นที่กดกล่องใหญ่ขึ้นและกดง่ายบนมือถือ */
  #gift-wrap { cursor: pointer; animation: pulse 1.8s ease-in-out infinite; user-select: none; padding: 20px; touch-action: manipulation; }
  #gift-wrap:hover { animation: wobble .5s ease-in-out infinite; }
  #gift-wrap.shake { animation: shake .5s ease-in-out; }
  #gift-wrap.gone { opacity: 0; transform: scale(0) rotate(20deg); transition: all .6s cubic-bezier(.4,2,.6,1); pointer-events: none; }
  
  .box-3d { width: 140px; height: 130px; position: relative; pointer-events: none; }
  .box-body { width: 140px; height: 90px; background: linear-gradient(135deg,#ff8fab,#ff6b9d); border-radius: 8px; position: absolute; bottom: 0; box-shadow: inset -8px 0 0 rgba(0,0,0,.15), 0 10px 30px rgba(255,100,150,.5); overflow: hidden; }
  .box-body::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:18px; height:100%; background:rgba(255,255,255,.3); }
  .box-lid { width:148px; height:38px; background:linear-gradient(135deg,#ff6b9d,#e84393); border-radius:6px 6px 0 0; position:absolute; top:0; left:-4px; }
  .box-lid::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:18px; height:100%; background:rgba(255,255,255,.25); }
  .ribbon-v { position:absolute; left:50%; transform:translateX(-50%); top:0; bottom:0; width:18px; background:linear-gradient(90deg,#ffe0a0,#ffd060,#ffe0a0); z-index:2; border-radius:2px; }
  .ribbon-h { position:absolute; top:0; left:0; right:0; height:18px; background:linear-gradient(180deg,#ffe0a0,#ffd060,#ffe0a0); z-index:2; border-radius:2px; }
  .bow { position:absolute; top:-18px; left:50%; transform:translateX(-50%); width:60px; height:28px; z-index:3; }
  .bow-left,.bow-right { position:absolute; top:0; width:26px; height:22px; background:linear-gradient(135deg,#ffd060,#ffb020); border-radius:50% 0 50% 0; }
  .bow-left { left:0; transform:rotate(-35deg); }
  .bow-right { right:0; transform:rotate(35deg); }
  .bow::after { content:''; position:absolute; top:4px; left:50%; transform:translateX(-50%); width:12px; height:12px; background:#ffb020; border-radius:50%; }
  
  /* ตัวหนังสือคลิกได้ด้วยเผื่อจิ้มพลาด */
  .click-hint { font-size:1.2rem; color:#ffe8b0; text-shadow:0 1px 6px rgba(0,0,0,.8); animation:blink 1.6s ease-in-out infinite; cursor: pointer; padding: 10px; }
  .sparkle { position:fixed; pointer-events:none; z-index:99; border-radius:50%; animation:sparkleAnim 1s forwards; }

  /* REVEAL */
  #reveal { display:none; width:100%; flex-direction:column; align-items:center; padding-bottom:40px; }
  #reveal.show { display:flex; }
  .reveal-title { font-size:clamp(1.6rem,5vw,2.4rem); color:#ffe8b0; text-shadow:0 2px 16px rgba(0,0,0,.8); margin:40px 0 20px; text-align:center; animation:floatY 3s ease-in-out infinite; }

  /* POLAROIDS */
  #polaroids { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:10px 20px; max-width:900px; }
  .polaroid { background:#fff9f0; padding:12px 12px 36px; box-shadow:0 8px 32px rgba(0,0,0,.35); border-radius:3px; opacity:0; transition:opacity .7s ease, transform .7s cubic-bezier(.2,1.4,.4,1); flex:0 0 auto; cursor: pointer; touch-action: manipulation; }
  .polaroid:nth-child(1) { transform:translateY(60px) rotate(-4deg) scale(.9); transition-delay:.1s; }
  .polaroid:nth-child(2) { transform:translateY(60px) rotate(3deg)  scale(.9); transition-delay:.25s; }
  .polaroid:nth-child(3) { transform:translateY(60px) rotate(-2deg) scale(.9); transition-delay:.4s; }
  .polaroid:nth-child(4) { transform:translateY(60px) rotate(5deg)  scale(.9); transition-delay:.55s; }
  .polaroid.visible:nth-child(1) { opacity:1; transform:rotate(-4deg) scale(1); }
  .polaroid.visible:nth-child(2) { opacity:1; transform:rotate(3deg)  scale(1); }
  .polaroid.visible:nth-child(3) { opacity:1; transform:rotate(-2deg) scale(1); }
  .polaroid.visible:nth-child(4) { opacity:1; transform:rotate(5deg)  scale(1); }
  .polaroid:hover { transform:scale(1.07) rotate(0deg) !important; z-index:10; box-shadow:0 16px 48px rgba(0,0,0,.45); }

  .photo-frame { width: 170px; height: 170px; overflow: hidden; border-radius: 1px; background: #e8d8c8; position: relative; pointer-events: none; }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
  .polaroid:hover .photo-frame img { transform: scale(1.05); }
  .polaroid .caption { text-align:center; margin-top:8px; font-size:.85rem; color:#b07050; pointer-events: none; }

  /* LIGHTBOX */
  #lightbox {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.85); z-index: 9999; /* ให้ลอยเหนือทุกสิ่ง */
    display: none; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.3s ease; cursor: pointer;
    touch-action: manipulation;
  }
  #lightbox.active { display: flex; opacity: 1; }
  #lightbox img {
    max-width: 75vw; max-height: 75vh; width: auto; height: auto; object-fit: scale-down; 
    border: 8
