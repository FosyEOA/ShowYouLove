<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เฟิร์สรักบีม 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Itim', cursive; 
    min-height: 100vh; 
    overflow-x: hidden; 
    background: #1a0a00;
    -webkit-tap-highlight-color: transparent; 
  }

  /* พื้นหลัง */
  #bg { 
    position: fixed; inset: 0; z-index: -2;
    background-image: url('https://i.postimg.cc/0j744BPw/84E3B9EB-D1F3-4039-A5B1-CCDAED22BE45.png'); 
    background-size: cover; background-position: center;
  }
  #bg::after { 
    content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.2); 
  }

  #scene { position: fixed; inset: 0; z-index: -1; pointer-events: none !important; }
  #app { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  /* GIFT */
  #gift-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; width: 100%; }
  .title-top { font-size: clamp(1.4rem,4vw,2rem); color: #ffe8b0; text-shadow: 0 2px 12px rgba(0,0,0,0.8); animation: floatY 3s ease-in-out infinite; text-align: center; padding: 0 1rem; pointer-events: none; }
  
  #gift-wrap { cursor: pointer; animation: pulse 1.8s ease-in-out infinite; user-select: none; padding: 20px; touch-action: manipulation; }
  #gift-wrap:hover { animation: wobble .5s ease-in-out infinite; }
  #gift-wrap.shake { animation: shake .5s ease-in-out; }
  #gift-wrap.gone { opacity: 0; transform: scale(0) rotate(20deg); transition: all .6s cubic-bezier(.4,2,.6,1); pointer-events: none; }
  
  .box-3d { width: 140px; height: 130px; position: relative; pointer-events: none; }
  .box-body { width: 140px; height: 90px; background: linear-gradient(135deg,#ff8fab,#ff6b9d); border-radius: 8px; position: absolute; bottom: 0; box-shadow: inset -8px 0 0 rgba(0,0,0,.15), 0 10px 30px rgba(255,100,150,.5); overflow: hidden; }
  .box-body::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:18px; height:100%; background:rgba(255,255,255,.3); }
  .box-lid { width:148px; height:38px; background:linear-gradient(135deg,#ff6b9d,#e84393); border-radius:6px 6px 0 0; position:absolute; top:0; left:-4px; }
  .box-lid::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:18px; height:100%; background:rgba(255,255,255,.25); }
  .ribbon-v { position:absolute; left:50%; transform:translateX(-50%); top:0; bottom:0; width:18px; background:linear-gradient(90deg,#ffe0a0,#ffd060,#ffe0a0); z-index:2; border-radius:2px; }
  .ribbon-h { position:absolute; top:0; left:0; right:0; height:18px; background:linear-gradient(180deg,#ffe0a0,#ffd060,#ffe0a0); z-index:2; border-radius:2px; }
  .bow { position:absolute; top:-18px; left:50%; transform:translateX(-50%); width:60px; height:28px; z-index:3; }
  .bow-left,.bow-right { position:absolute; top:0; width:26px; height:22px; background:linear-gradient(135deg,#ffd060,#ffb020); border-radius:50% 0 50% 0; }
  .bow-left { left:0; transform:rotate(-35deg); }
  .bow-right { right:0; transform:rotate(35deg); }
  .bow::after { content:''; position:absolute; top:4px; left:50%; transform:translateX(-50%); width:12px; height:12px; background:#ffb020; border-radius:50%; }
  
  .click-hint { font-size:1.2rem; color:#ffe8b0; text-shadow:0 1px 6px rgba(0,0,0,.8); animation:blink 1.6s ease-in-out infinite; cursor: pointer; padding: 10px; touch-action: manipulation;}
  .sparkle { position:fixed; pointer-events:none; z-index:99; border-radius:50%; animation:sparkleAnim 1s forwards; }

  /* REVEAL */
  #reveal { display:none; width:100%; flex-direction:column; align-items:center; padding-bottom:40px; }
  #reveal.show { display:flex; }
  .reveal-title { font-size:clamp(1.6rem,5vw,2.4rem); color:#ffe8b0; text-shadow:0 2px 16px rgba(0,0,0,.8); margin:40px 0 20px; text-align:center; animation:floatY 3s ease-in-out infinite; }

  /* POLAROIDS */
  #polaroids { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:10px 20px; max-width:900px; }
  .polaroid { background:#fff9f0; padding:12px 12px 36px; box-shadow:0 8px 32px rgba(0,0,0,.35); border-radius:3px; opacity:0; transition:opacity .7s ease, transform .7s cubic-bezier(.2,1.4,.4,1); flex:0 0 auto; cursor: pointer; touch-action: manipulation; }
  .polaroid:nth-child(1) { transform:translateY(60px) rotate(-4deg) scale(.9); transition-delay:.1s; }
  .polaroid:nth-child(2) { transform:translateY(60px) rotate(3deg)  scale(.9); transition-delay:.25s; }
  .polaroid:nth-child(3) { transform:translateY(60px) rotate(-2deg) scale(.9); transition-delay:.4s; }
  .polaroid:nth-child(4) { transform:translateY(60px) rotate(5deg)  scale(.9); transition-delay:.55s; }
  .polaroid.visible:nth-child(1) { opacity:1; transform:rotate(-4deg) scale(1); }
  .polaroid.visible:nth-child(2) { opacity:1; transform:rotate(3deg)  scale(1); }
  .polaroid.visible:nth-child(3) { opacity:1; transform:rotate(-2deg) scale(1); }
  .polaroid.visible:nth-child(4) { opacity:1; transform:rotate(5deg)  scale(1); }
  .polaroid:hover { transform:scale(1.07) rotate(0deg) !important; z-index:10; box-shadow:0 16px 48px rgba(0,0,0,.45); }

  .photo-frame { width: 170px; height: 170px; overflow: hidden; border-radius: 1px; background: #e8d8c8; position: relative; pointer-events: none; }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
  .polaroid:hover .photo-frame img { transform: scale(1.05); }
  .polaroid .caption { text-align:center; margin-top:8px; font-size:.85rem; color:#b07050; pointer-events: none; }

  /* LIGHTBOX */
  #lightbox {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.85); z-index: 9999; 
    display: none; justify-content: center; align-items: center;
    opacity: 0; transition: opacity 0.3s ease; cursor: pointer;
    touch-action: manipulation;
  }
  #lightbox.active { display: flex; opacity: 1; }
  #lightbox img {
    max-width: 75vw; max-height: 75vh; width: auto; height: auto; object-fit: scale-down; 
    border: 8px solid white; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
    transform: scale(0.8); transition: transform 0.3s ease;
  }
  #lightbox.active img { transform: scale(1); }
  .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

  /* MESSAGE */
  #msg-box { max-width:580px; width:90%; background:rgba(0,0,0,.4); backdrop-filter:blur(8px); border:1.5px solid rgba(255,220,140,.4); border-radius:20px; padding:28px 32px; margin:30px auto 10px; text-align:center; opacity:0; transform:translateY(30px); transition:opacity .8s ease .9s,transform .8s ease .9s; }
  #msg-box.visible { opacity:1; transform:translateY(0); }
  #msg-box p { font-size:clamp(1.05rem,3vw,1.3rem); color:#ffe8c0; line-height:2; text-shadow:0 1px 6px rgba(0,0,0,.6); }
  .heart-deco { font-size:1.8rem; margin-bottom:8px; animation:heartBeat 1.2s ease-in-out infinite; }

  /* MUSIC & LYRICS */
  #music-section { width:100%; max-width:680px; margin:20px auto 0; padding:0 16px 60px; display:flex; flex-direction:column; align-items:center; gap:16px; opacity:0; transform:translateY(30px); transition:opacity .8s ease 1.4s,transform .8s ease 1.4s; }
  #music-section.visible { opacity:1; transform:translateY(0); }
  .music-label { font-size:1.1rem; color:#ffe8b0; text-shadow:0 1px 8px rgba(0,0,0,.8); }
  
  /* แก้ไขสำหรับ iOS: เอาไปแอบไว้นอกจอ และปรับให้มีขนาดจริง iOS จะได้ไม่บล็อก */
  #yt-wrapper { position: absolute; top: -2000px; left: -2000px; width: 200px; height: 200px; opacity: 0.01; pointer-events: none; } 

  #lyrics-container { width: 100%; height: 120px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #lyrics-inner { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .lyric-line { 
    position: absolute; font-size: clamp(1.4rem, 4.5vw, 1.8rem); color: #ffffff; text-align: center; width: 100%; padding: 0 20px; opacity: 0; pointer-events: none; font-weight: bold;
    text-shadow: -1px -1px 0 #ff6b9d, 1px -1px 0 #ff6b9d, -1px 1px 0 #ff6b9d, 1px 1px 0 #ff6b9d, 3px 3px 0 #e84393, 0 4px 15px rgba(0,0,0,0.6);
  }
  .lyric-line.active { opacity: 1; animation: popBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  .lyric-line.past { opacity: 0; transform: translateY(-30px) scale(0.9); transition: all 0.4s ease-in; }
  .float-heart { position:fixed; pointer-events:none; z-index:1; animation:floatHeart linear forwards; opacity:.7; }

  @keyframes popBounce { 0% { opacity: 0; transform: scale(0.5) translateY(40px); } 70% { opacity: 1; transform: scale(1.1) translateY(-5px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes wobble   { 0%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}100%{transform:rotate(0)} }
  @keyframes shake    { 0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-5deg)}40%{transform:translateX(10px) rotate(5deg)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)} }
  @keyframes floatY   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes heartBeat{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
  @keyframes sparkleAnim { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }
  @keyframes floatHeart  { 0%{transform:translateY(0);opacity:.7} 100%{transform:translateY(-100vh);opacity:0} }
</style>
</head>
<body>
<div id="bg"></div>

<svg id="scene" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs><radialGradient id="moon" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fff8dc"/><stop offset="100%" stop-color="#ffd060" stop-opacity=".6"/></radialGradient></defs>
  <circle cx="1100" cy="120" r="55" fill="url(#moon)" opacity=".85"/>
  <g fill="#fff">
    <circle cx="80"  cy="60"  r="1.5" style="animation:starTwinkle 2.1s ease-in-out infinite"/>
    <circle cx="340" cy="80"  r="2"   style="animation:starTwinkle 2.4s ease-in-out infinite .2s"/>
    <circle cx="700" cy="20"  r="1"   style="animation:starTwinkle 2.7s ease-in-out infinite .1s"/>
  </g>
</svg>

<div id="app">
  <div id="gift-screen">
    <p class="title-top">🌸 มีของขวัญให้บี๋นะ 🌸</p>
    <div id="gift-wrap" onclick="openGift()">
      <div class="box-3d">
        <div class="bow"><div class="bow-left"></div><div class="bow-right"></div></div>
        <div class="box-lid"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
        <div class="box-body"><div class="ribbon-v"></div><div class="ribbon-h"></div></div>
      </div>
    </div>
    <p class="click-hint" onclick="openGift()">👆 กดเปิดของขวัญ</p>
  </div>

  <div id="reveal">
    <p class="reveal-title">💛 ช่วงเวลาของเรา 💛</p>
    
    <div id="polaroids">
      <div class="polaroid" onclick="openLightbox('https://i.postimg.cc/sBqWzmzx/DSC00023.jpg')">
        <div class="photo-frame"><img src="https://i.postimg.cc/sBqWzmzx/DSC00023.jpg" alt="Photo 1"></div>
        <div class="caption">🌸 ชอบมากๆ</div>
      </div>
      <div class="polaroid" onclick="openLightbox('https://i.postimg.cc/mz9Hg9ZV/IMG-4684.jpg')">
        <div class="photo-frame"><img src="https://i.postimg.cc/mz9Hg9ZV/IMG-4684.jpg" alt="Photo 2"></div>
        <div class="caption">✨ ความทรงจำ</div>
      </div>
      <div class="polaroid" onclick="openLightbox('https://i.postimg.cc/7Gz2ZzPm/IMG-4686.jpg')">
        <div class="photo-frame"><img src="https://i.postimg.cc/7Gz2ZzPm/IMG-4686.jpg" alt="Photo 3"></div>
        <div class="caption">🌻 ด้วยกันเสมอ</div>
      </div>
      <div class="polaroid" onclick="openLightbox('https://i.postimg.cc/FdSLHSFP/IMG-9691.jpg')">
        <div class="photo-frame"><img src="https://i.postimg.cc/FdSLHSFP/IMG-9691.jpg" alt="Photo 4"></div>
        <div class="caption">💛 รักบี๋มากๆ</div>
      </div>
    </div>

    <div id="msg-box">
      <div class="heart-deco">💛🌸💛</div>
      <p>เย้เย้ เค้ารักบี๋มากๆเลย<br>เค้าอยากอยู่กับบี๋นานๆ<br>ไปเที่ยวด้วยกันเยอะๆ มีความสุขทุกๆวัน<br>เค้าตั้งใจทำเพื่อบี๋เลยนะ<br>เฟิร์สรักบีมนะครับ จุ๊บๆ 💋</p>
    </div>

    <div id="music-section">
      <p class="music-label">🎵 Sunday Morning — Maroon 5 🎵</p>
      <div id="yt-wrapper"><div id="yt-player"></div></div>
      <div id="lyrics-container"><div id="lyrics-inner"></div></div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="close-btn">&times;</span>
  <img id="lightbox-img" src="" alt="Full Screen">
</div>

<script>
// LYRICS
const lyricsData = [
  {time:5.0,text:"🎵"},
  {time:19.0,text:"Sunday morning, rain is falling"},
  {time:23.5,text:"Steal some covers, share some skin"},
  {time:30.0,text:"Clouds are shrouding us in moments unforgettable"},
  {time:35.5,text:"You twist to fit the mold that I am in"},
  {time:41.5,text:"But things just get so crazy"},{time:44.5,text:"Living life gets hard to do"},
  {time:48.0,text:"And I would gladly hit the road"},{time:51.5,text:"Get up and go if I knew"},
  {time:55.0,text:"That someday it would lead me back to you"},
  {time:59.5,text:"That someday it would lead me back to you"},
  {time:67.0,text:"That may be all I need"},{time:74.0,text:"In darkness, she is all I see"},
  {time:79.5,text:"Come and rest your bones with me"},
  {time:86.0,text:"Driving slow on Sunday morning"},{time:92.0,text:"And I never want to leave"},
  {time:99.0,text:"Fingers trace your every outline"},{time:104.0,text:"Paint a picture with my hands"},
  {time:110.0,text:"Back and forth we sway like branches in a storm"},
  {time:116.0,text:"Change the weather, still together when it ends"},
  {time:122.0,text:"That may be all I need"},{time:129.0,text:"In darkness, she is all I see"},
  {time:134.5,text:"Come and rest your bones with me"},
  {time:141.0,text:"Driving slow on Sunday morning"},{time:147.0,text:"And I never want to leave"},
  {time:154.0,text:"🎷 (Solo) 🎷"},{time:160.0,text:"เฟิร์สรักบีมมากๆ นะครับ ❤️"},
  {time:166.0,text:"อยู่ด้วยกันไปนานๆ ทุกๆ วันเลยนะ 🌻"},
  {time:177.0,text:"But things just get so crazy"},{time:180.5,text:"Living life gets hard to do"},
  {time:183.0,text:"Sunday morning, rain is falling and I'm calling out to you"},
  {time:190.0,text:"Singing, someday it'll bring me back to you"},
  {time:195.0,text:"Find a way to bring myself back home to you"},
  {time:202.0,text:"And you may not know"},{time:207.0,text:"That may be all I need"},
  {time:214.0,text:"In darkness, she is all I see"},{time:219.5,text:"Come and rest your bones with me"},
  {time:226.0,text:"Driving slow on Sunday morning"},{time:233.0,text:"Driving slow..."},
  {time:240.0,text:"เย้เย้ จบแล้ว จุ๊บๆ 😘"}
];

const li = document.getElementById('lyrics-inner');
lyricsData.forEach((l,i) => {
  const d = document.createElement('div');
  d.className='lyric-line'; d.textContent=l.text; d.id='lyric-'+i;
  li.appendChild(d);
});

let activeIdx=-1;
function updateLyrics(t) {
  let cur=-1;
  for(let i=0;i<lyricsData.length;i++) if(t>=lyricsData[i].time) cur=i;
  if(cur===activeIdx) return;
  activeIdx=cur;
  document.querySelectorAll('.lyric-line').forEach((el,i)=>{
    el.classList.remove('active','past');
    if(i===cur) el.classList.add('active');
    else if(i<cur) el.classList.add('past');
  });
}

// YOUTUBE
let ytPlayer=null,lyricTimer=null;
window.onYouTubeIframeAPIReady=function(){
  ytPlayer=new YT.Player('yt-player',{
    videoId:'to5Sg2KeEnU', 
    playerVars:{rel:0,modestbranding:1,playsinline:1,autoplay:0},
    events:{onStateChange:e=>{
      if(e.data===YT.PlayerState.PLAYING){
        clearInterval(lyricTimer);
        lyricTimer=setInterval(()=>{
          try {
            if(ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
              updateLyrics(ytPlayer.getCurrentTime());
            }
          } catch(err) {}
        },300);
      } else clearInterval(lyricTimer);
    }}
  });
};
const yt=document.createElement('script');
yt.src='https://www.youtube.com/iframe_api';
document.head.appendChild(yt);

function spawnSparkles(x,y){
  const cols=['#ffd700','#ff8fab','#fff','#ffb347','#ff6b9d','#a8edea'];
  for(let i=0;i<28;i++){
    const s=document.createElement('div'); s.className='sparkle';
    const a=Math.random()*360,d=60+Math.random()*140;
    s.style.cssText=`left:${x}px;top:${y}px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${4+Math.random()*10}px;height:${4+Math.random()*10}px;--dx:${Math.cos(a*Math.PI/180)*d}px;--dy:${Math.sin(a*Math.PI/180)*d}px;animation-duration:${.6+Math.random()*.8}s;`;
    document.body.appendChild(s);
    s.addEventListener('animationend',()=>s.remove());
  }
}

function spawnHeart(){
  const h=document.createElement('div'); h.className='float-heart';
  h.textContent=['💛','🌸','✨','💕','🌻','💖'][Math.floor(Math.random()*6)];
  h.style.cssText=`left:${Math.random()*100}vw;bottom:-40px;animation-duration:${4+Math.random()*5}s;font-size:${1+Math.random()*1.2}rem;`;
  document.body.appendChild(h);
  h.addEventListener('animationend',()=>h.remove());
}
setInterval(spawnHeart,1800);

function openLightbox(imgSrc) {
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  lightboxImg.src = imgSrc;
  lightbox.classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// OPEN GIFT (แก้ไขการทำงานบน iOS)
function openGift(){
  const w=document.getElementById('gift-wrap');
  if(w.classList.contains('shake')) return;
  
  // 1. สั่งเล่นเพลง "ทันที" ในจังหวะที่นิ้วแตะจอ ห้ามหน่วงเวลาเด็ดขาด (แก้บัค iOS)
  try {
    if(ytPlayer && typeof ytPlayer.playVideo === 'function') {
      ytPlayer.playVideo();
    }
  } catch(e) { console.error("YouTube Error:", e); }

  // 2. ให้กล่องเริ่มสั่น
  w.classList.add('shake');
  
  // 3. ปล่อยให้แอนิเมชันที่เหลือทำงานต่อไป
  const r=w.getBoundingClientRect();
  setTimeout(()=>{
    spawnSparkles(r.left+r.width/2,r.top+r.height/2);
    w.classList.add('gone');
    setTimeout(()=>{
      document.getElementById('gift-screen').style.display='none';
      document.getElementById('reveal').classList.add('show');
      setTimeout(()=>document.querySelectorAll('.polaroid').forEach(p=>p.classList.add('visible')),100);
      setTimeout(()=>{
        document.getElementById('msg-box').classList.add('visible');
        document.getElementById('music-section').classList.add('visible');
      },600);
      for(let i=0;i<5;i++) setTimeout(()=>spawnSparkles(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.6),i*200);
    },700);
  },500);
}
</script>
</body>
</html>
